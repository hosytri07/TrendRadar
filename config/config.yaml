# =====================================================
# TrendRadar Config — TrishTeam GTVT Edition
# Nguồn: Fork từ github.com/sansan0/TrendRadar
# Mục đích: Theo dõi tin tức Giao thông VN → Push Telegram
# =====================================================

# ── AI Configuration (tùy chọn, để trống nếu không dùng) ──
ai:
  enabled: false          # Đặt true nếu có OpenAI/Gemini API key
  provider: openai
  model: gpt-4o-mini
  api_key: ""             # Thay bằng API key của bạn
  
ai_translation:
  enabled: false           # Không cần dịch vì đã là tiếng Việt
  language: "Vietnamese"

# ── Telegram Push ──
telegram:
  enabled: true
  bot_token: "8668861015:AAES7-vHAOuuV2D4Nk2budyQIzgZ9arIYRU"  # Bot TrishTeam
  chat_id: "1687867690"    # Chat ID Admin

# ── RSS Sources — Tin tức GTVT Việt Nam ──
rss:
  enabled: true
  sources:
    - name: "Báo Giao Thông"
      url: "https://baogiaothong.vn/rss/tin-moi.rss"
    - name: "VnExpress - Giao thông"
      url: "https://vnexpress.net/rss/giao-thong.rss"
    - name: "Tuổi Trẻ - Xe & Công nghệ"
      url: "https://tuoitre.vn/rss/xe-co.rss"
    - name: "Dân Trí - Giao thông"
      url: "https://dantri.com.vn/xa-hoi/giao-thong.rss"
  max_items: 20            # Số tin tối đa mỗi nguồn

# ── Keyword Filter — chỉ push tin liên quan ──
frequency_words:
  - giao thông
  - đường bộ
  - tai nạn
  - cầu đường
  - hạ tầng
  - xe máy
  - ô tô
  - biển báo
  - tốc độ
  - phạt nguội
  - camera giao thông
  - cao tốc
  - quốc lộ
  - Bộ GTVT
  - Cục CSGT

# ── Schedule (GitHub Actions cron) ──
# Cài trong workflow.yml: "0 */6 * * *" = mỗi 6 tiếng

# ── Display settings ──
display:
  regions:
    rss: true
    hotlist: false          # Tắt hotlist TQ
    ai_analysis: false
  max_message_length: 4000  # Telegram limit
